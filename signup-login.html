<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReuniteHub | Lost & Found Community</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<!-- Add this Login/Signup Section before the footer -->
<section class="auth-section" id="auth">
    <div class="auth-container">
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="showForm('login')">Login</div>
            <div class="auth-tab" onclick="showForm('signup')">Sign Up</div>
        </div>

        <!-- Login Form -->
        <form class="auth-form active" id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="auth-btn">Login</button>
            <div class="auth-links">
                <a href="#forgot-password">Forgot Password?</a>
            </div>
            <div class="social-auth">
                <p>Or continue with</p>
                <button type="button" class="social-btn">
                    <i class="fab fa-google"></i> Google
                </button>
                <button type="button" class="social-btn">
                    <i class="fab fa-facebook"></i> Facebook
                </button>
            </div>
        </form>

        <!-- Signup Form -->
        <form class="auth-form" id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" class="form-control" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="auth-btn">Create Account</button>
            <div class="auth-links">
                Already have an account? <a href="#login" onclick="showForm('login')">Login here</a>
            </div>
        </form>
    </div>
</section>
<!-- Add this JavaScript before closing body tag -->
<script>
    function showForm(formType) {
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const tabs = document.querySelectorAll('.auth-tab');

        tabs.forEach(tab => tab.classList.remove('active'));
        loginForm.classList.remove('active');
        signupForm.classList.remove('active');

        if(formType === 'login') {
            document.querySelector(`.auth-tab:nth-child(1)`).classList.add('active');
            loginForm.classList.add('active');
        } else {
            document.querySelector(`.auth-tab:nth-child(2)`).classList.add('active');
            signupForm.classList.add('active');
        }
    }
</script>
<style>
    /* Auth Section */
    .auth-section {
        padding: 5rem 5%;
        background: #f9f9f9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-container {
        background: white;
        max-width: 500px;
        width: 100%;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .auth-tabs {
        display: flex;
        margin-bottom: 2rem;
        border-bottom: 2px solid #eee;
    }

    .auth-tab {
        flex: 1;
        padding: 1rem;
        text-align: center;
        cursor: pointer;
        color: #666;
        font-weight: 500;
        transition: all 0.3s ease;
    }

    .auth-tab.active {
        color: #2c3e50;
        border-bottom: 3px solid #27ae60;
    }

    .auth-form {
        display: none;
    }

    .auth-form.active {
        display: block;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #2c3e50;
    }

    .form-control {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 1rem;
    }

    .form-control:focus {
        outline: none;
        border-color: #27ae60;
        box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.1);
    }

    .auth-btn {
        width: 100%;
        padding: 1rem;
        background: #27ae60;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.3s ease;
    }

    .auth-btn:hover {
        background: #219a52;
    }

    .auth-links {
        text-align: center;
        margin-top: 1.5rem;
    }

    .auth-links a {
        color: #27ae60;
        text-decoration: none;
        font-weight: 500;
    }

    .social-auth {
        margin-top: 2rem;
        text-align: center;
    }

    .social-btn {
        display: inline-flex;
        align-items: center;
        padding: 0.8rem 1.5rem;
        margin: 0 0.5rem;
        border: 1px solid #ddd;
        border-radius: 5px;
        background: white;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .social-btn i {
        margin-right: 0.5rem;
    }
</style>
